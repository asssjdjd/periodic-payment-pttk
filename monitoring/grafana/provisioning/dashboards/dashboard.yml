apiVersion: 1

providers:
  - name: 'Microservices Dashboards'
    orgId: 1
    folder: 'Services Monitoring'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    options:
      # Đường dẫn này là thư mục bên TRONG container Grafana (sẽ được mount từ docker-compose)
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false