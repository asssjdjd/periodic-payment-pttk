apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: periodic-payment
data:
  kong.yml: |
    _format_version: "3.0"
    services:
      # User Service
      - name: user-service-upstream
        url: http://user-service:8081
        routes:
          - name: user-route
            paths:
              - /api/v1/customers/search
              - /api/v1/customers/search-by-cccd
            strip_path: false

      # Payment Service
      - name: payment-service-upstream
        url: http://payment-service:8080
        routes:
          - name: payment-route
            paths:
              - /api/v1/payments
            strip_path: false

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: periodic-payment
  labels:
    app: kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
      - name: kong
        image: kong:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: proxy
          containerPort: 8000
          protocol: TCP
        - name: admin
          containerPort: 8001
          protocol: TCP
        env:
        - name: KONG_DATABASE
          value: "off"
        - name: KONG_DECLARATIVE_CONFIG
          value: /etc/kong/kong.yml
        - name: KONG_PROXY_ACCESS_LOG
          value: /dev/stdout
        - name: KONG_PROXY_ERROR_LOG
          value: /dev/stderr
        - name: KONG_ADMIN_LISTEN
          value: "0.0.0.0:8001"
        - name: KONG_ADMIN_ACCESS_LOG
          value: /dev/stdout
        - name: KONG_ADMIN_ERROR_LOG
          value: /dev/stderr
        volumeMounts:
        - name: kong-config
          mountPath: /etc/kong
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /status
            port: admin
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /status
            port: admin
          initialDelaySeconds: 45
          periodSeconds: 5
      volumes:
      - name: kong-config
        configMap:
          name: kong-config

---
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: periodic-payment
  labels:
    app: kong
spec:
  type: ClusterIP
  selector:
    app: kong
  ports:
  - name: proxy
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: admin
    port: 8001
    targetPort: 8001
    protocol: TCP
