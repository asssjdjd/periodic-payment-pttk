_format_version: "3.0"
services:
  # 1. Định nghĩa Service đích (User)
  - name: user-service-upstream
    url: http://user-service:8081 # Sử dụng DNS nội bộ của Docker
    routes:
      - name: user-route
        paths:
          - /api/v1/customers/search
          - /api/v1/customers/search-by-cccd
        strip_path: false

  # 2. Định nghĩa Service đích (Payment)
  - name: payment-service-upstream
    url: http://payment-service:8080
    routes:
      - name: payment-route
        paths:
          - /api/v1/payments
        strip_path: false