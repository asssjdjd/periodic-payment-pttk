_format_version: "3.0"

plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true

services:
  - name: statistics-service
    url: http://statistics-service:8081
    routes:
      - name: statistics-route
        paths:
          - /api/v1/statistics
        strip_path: false

  - name: payment-service
    url: http://payment-service:8080
    routes:
      - name: payment-route
        paths:
          - /api/v1/payments
        strip_path: false

  - name: account-service
    url: http://account-service:8082
    routes:
      - name: account-route
        paths:
          - /api/v1/customers
        strip_path: false

  - name: supplier-service
    url: http://supplier-service:8083
    routes:
      - name: supplier-route
        paths:
          - /api/v1/suppliers
          - /api/v1/import-orders
        strip_path: false